# Render 部署蓝图（Blueprint）
# 在 Render 控制台 New + → Blueprint，连接本仓库即可按此配置创建服务。
services:
  - type: web
    name: cp-tutor-agent
    runtime: docker
    plan: free
    region: singapore        # 离国内较近
    healthCheckPath: /api/problems
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false           # 不写进仓库；在 Render 面板手动填入密钥
